<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Bill - CA Deepak Bhayana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Generate Invoice for: {{ client.name }}</h4>
            </div>
            <div class="card-body">
                <form action="/generate-pdf/{{ client.id }}" method="POST">
                    <div class="mb-3">
                        <label>Service Description</label>
                        <input type="text" name="service" class="form-control" placeholder="e.g. GST Filing Fees - Q3" required>
                    </div>
                    <div class="mb-3">
                        <label>Amount (Excluding GST)</label>
                        <input type="number" name="amount" class="form-control" placeholder="10000" required>
                    </div>
                    <div class="mb-3">
                        <label>GST Rate (%)</label>
                        <select name="gst_rate" class="form-select">
                            <option value="18">18% (Standard)</option>
                            <option value="12">12%</option>
                            <option value="5">5%</option>
                            <option value="0">Exempted</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Generate & Download PDF Bill</button>
                    <a href="/" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
