<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <h3>Change Login ID/Password</h3>
    <form method="POST" class="card p-4 shadow">
        <input type="text" name="new_username" class="form-control mb-3" placeholder="New Login ID">
        <input type="password" name="new_password" class="form-control mb-3" placeholder="New Password">
        <button class="btn btn-warning">Update Credentials</button>
        <a href="/" class="btn btn-secondary mt-2">Back</a>
    </form>
</div>
