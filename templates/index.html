<div class="card p-4 mb-4 shadow-sm">
    <h5>Add New Client</h5>
    <form action="/add-client" method="POST" class="row g-3">
        <div class="col-md-4"><input type="text" name="name" class="form-control" placeholder="Client Name" required></div>
        <div class="col-md-4"><input type="text" name="gstin" class="form-control" placeholder="GSTIN (Optional)"></div>
        <div class="col-md-4"><input type="email" name="email" class="form-control" placeholder="Email Address"></div>
        <div class="col-md-4"><input type="text" name="contact" class="form-control" placeholder="Contact No"></div>
        <div class="col-md-8"><input type="text" name="address" class="form-control" placeholder="Full Address"></div>
        <div class="col-12"><button class="btn btn-success">Save Client</button></div>
    </form>

    <hr class="my-4">

    <h5>Bulk Import (Excel/CSV)</h5>
    <form action="/upload-excel" method="POST" enctype="multipart/form-data" class="row g-3">
        <div class="col-md-8"><input type="file" name="file" class="form-control" accept=".xlsx, .csv" required></div>
        <div class="col-md-4"><button class="btn btn-primary w-100">Upload Excel</button></div>
        <p class="small text-muted">Note: Excel columns should be: <b>Name, GST, Email, Contact, Address</b></p>
    </form>
</div>
